openapi: 3.0.3
info:
  title: Employee API
  description: API specification for managing employees
  version: 1.0.0

servers:
  - url: https://api.company.com/v1

paths:
  /employees:
    get:
      summary: Get all employees
      description: Retrieve a list of all employees
      responses:
        '200':
          description: A list of employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Employee'

    post:
      summary: Create a new employee
      description: Add a new employee record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeInput'
      responses:
        '201':
          description: Employee created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'

  /employees/{employeeId}:
    get:
      summary: Get employee by ID
      description: Retrieve details of a specific employee
      parameters:
        - name: employeeId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Employee details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '404':
          description: Employee not found

components:
  schemas:
    Employee:
      type: object
      properties:
        id:
          type: string
          example: "emp123"
        name:
          type: string
          example: "John Doe"
        department:
          type: string
          example: "Engineering"
        email:
          type: string
          format: email
          example: "john.doe@company.com"

    EmployeeInput:
      type: object
      required:
        - name
        - department
        - email
      properties:
        name:
          type: string
          example: "Jane Smith"
        department:
          type: string
          example: "HR"
        email:
          type: string
          format: email
          example: "jane.smith@company.com"
