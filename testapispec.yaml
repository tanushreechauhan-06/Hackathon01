openapi: 3.0.3
info:
  title: Employee Service API
  version: 1.0.0
  description: API to retrieve employee details

servers:
  - url: https://api.example.com
    description: Production server

paths:
  /employees/{employeeId}:
    get:
      summary: Get employee details
      description: Retrieve details of a specific employee by ID
      parameters:
        - name: employeeId
          in: path
          required: true
          description: Unique identifier of the employee
          schema:
            type: string
      responses:
        '200':
          description: Employee details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '404':
          description: Employee not found
        '500':
          description: Internal server error

components:
  schemas:
    Employee:
      type: object
      properties:
        id:
          type: string
          example: "E12345"
        firstName:
          type: string
          example: "Tanushree"
        lastName:
          type: string
          example: "Sharma"
        email:
          type: string
          format: email
          example: "tanushree.sharma@example.com"
        department:
          type: string
          example: "Engineering"
        role:
          type: string
          example: "Backend Engineer"
